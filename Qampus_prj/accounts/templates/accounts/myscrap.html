<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    {% load humanize %}
    <a href="{% url 'Qampus:main' %}">메인 페이지로 돌아가기</a><br>

    <h2>내가 스크랩한 글!</h2>
    {% for post in scraped_posts %}
        <a href="{% url 'Qampus:detail' post.id %}">{{ post.title }}</a>
        <p>{{ post.content }}</p>
        <p>{{ post.created_at|naturaltime }}</p>
        <p>{{ post.author.nickname }}</p>
    {% empty %}
        스크랩한 글이 없습니다.
    {% endfor %}

</body>
</html>
