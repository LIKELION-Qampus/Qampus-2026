<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    {% load humanize %}
    {% for post in posts %}
        <a href="{% url 'Qampus:detail' post.id %}">{{ post.title }}</a></h3>
        <p>{{ post.content }}</p>
        <p>작성일 - {{ post.created_at|naturaltime }}</p>
        <p>작성자 - {{ post.author.nickname }}</p>
        <br>

    {% empty %}
        <p>작성한 글이 없습니다.</p>
    {% endfor %}

    <br>
    <a href="{% url 'Qampus:main' %}">메인페이지로 돌아가기</a>
</body>
</html>
